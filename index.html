
<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BPTracker | 血壓紀錄 App</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #526077;
      --accent: #1463ff;
      --border: #d8e1ef;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang HK", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    h1 { margin-top: 0; }
    p { line-height: 1.6; }
    nav a { margin-right: 14px; color: var(--accent); text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    .meta { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>BPTracker</h1>
      <p>BPTracker 是一個簡潔的血壓紀錄 App，方便日常記錄收縮壓、舒張壓、脈搏、備註與時段，並可匯出報表作健康管理用途。</p>
      <p class="meta">開發者：Hacken Tsui</p>
      <p class="meta">支援電郵：support@hackentsui.com</p>
      <nav>
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </nav>
    </section>
  </main>
</body>
</html>
